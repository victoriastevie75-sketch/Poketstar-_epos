<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Poketstar POS (Demo)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Poketstar POS — Demo</h1>
    <div id="clock"></div>
  </header>

  <main>
    <section id="sales">
      <h2>Sales</h2>

      <div class="search-row">
        <input id="barcodeInput" placeholder="Scan barcode or type product name" />
        <button id="addToCartBtn">Add</button>
      </div>

      <table id="cartTable">
        <thead><tr><th>Item</th><th>Qty</th><th>Unit (KES)</th><th>Total (KES)</th><th></th></tr></thead>
        <tbody></tbody>
      </table>

      <div class="totals">
        <div>Subtotal: <span id="subtotal">KES 0.00</span></div>
        <div>Tax: <span id="tax">KES 0.00</span></div>
        <div>Discount: <span id="discount">KES 0.00</span></div>
        <div class="grand">Grand Total: <span id="grandTotal">KES 0.00</span></div>
      </div>

      <div class="actions">
        <input id="paymentAmount" placeholder="Amount tendered (KES)" />
        <button id="completeSaleBtn">Complete Sale</button>
        <button id="printReceiptBtn">Print Receipt</button>
      </div>
    </section>

    <aside id="sidebar">
      <h3>Products</h3>
      <div id="productList"></div>
      <button id="openAdmin">Open Admin</button>
    </aside>

    <div id="adminModal" class="modal hidden">
      <div class="modal-inner">
        <h2>Admin — Products & Inventory</h2>
        <form id="productForm">
          <input id="p_name" placeholder="Name" required />
          <input id="p_barcode" placeholder="Barcode / SKU" />
          <input id="p_price" placeholder="Unit price (KES)" type="number" step="0.01" required />
          <input id="p_qty" placeholder="Quantity" type="number" required />
          <button type="submit">Save Product</button>
        </form>

        <h3>Reports</h3>
        <button id="exportSalesBtn">Export Sales (JSON)</button>
        <button id="closeAdmin">Close</button>
      </div>
    </div>

    <div id="receipt" class="hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
